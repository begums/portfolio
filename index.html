<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="images/brick-icon.png">
    <title>Begüm Saral</title>
</head>
<body>

    <!-- ── NAV ── -->
    <nav>
        <a href="index.html" class="nav-name" style="text-decoration: none; color: inherit; cursor: pointer;">Begüm Saral</a>
        <div class="nav-links">
            <button onclick="window.location.href='information.html'">Information,</button>
            <button onclick="openPanel('contactPanel')">Contact</button>
        </div>
    </nav>

    <!-- ── SCROLL STRIP ── -->
    <div id="scrollStrip">
        <div id="scrollTrack">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- ── CONTACT PANEL ── -->
    <div class="panel" id="contactPanel">
        <div class="panel-inner">
            <button class="close-btn" onclick="closePanel('contactPanel')">Close</button>
            <div class="panel-content">
                <h2>Contact</h2>
                <p><a href="mailto:saral.begum@gmail.com">saral.begum@gmail.com</a></p>
                <p><a href="https://github.com/begums" target="_blank">GitHub ↗</a></p>
            </div>
        </div>
    </div>

    <script>
        // ── PROJECT DATA ──
        // Edit this list to add/remove projects.
        // 'cover' is the thumbnail shown in the scroll strip.
        // 'images' are shown in the project detail page.
        // All image paths are relative to index.html (e.g. "images/myfile.jpg")
        const PROJECTS = [
            {
                id: "proj1",
                title: "Robotic Deconstruction of Mortar-Bound Brickwork",
                tag: "Robotics + Computer Vision",
                year: "2024-25",
                description: "Robotic deconstruction offers a precise and environmentally responsible alternative to conventional demolition, enabling the selective recovery of building materials for reuse. This research presents a methodology for robotic deconstruction enabled by Spatial Artificial Intelligence (Spatial AI), demonstrated through the case of brickwork. The approach comprises: (1) a deep learning-based real-time object perception system, trained on synthetic photorealistic data to detect and localise individual bricks; (2) the incremental registration and spatial mapping of these discrete elements within an evolving as-built digital twin; and (3) reasoning and control routines that enable perception- and mapping-informed, stepwise robotic deconstruction. The mortar-bound deconstruction project builds on the previous dry-stacked case study by moving the concept closer to real-world application, while addressing challenges such as brick perception with mortar occlusion, as well as robotic mortar removal, and brick detachment.",
                keywords: ["Spatial AI", "Material reclamation", "Deep learning-based object perception", "Synthetic photorealistic data generation"],
                github: "https://github.com/begums",
                vimeo_id: "0000000",
                cover: "images/Project_1_image_0.png",
                images: ["images/Project_1_image_0.png"]
            },
            {
                id: "proj2",
                title: "Robotic Disassembly of Dry-stacked Brickwork",
                tag: "Robotics + Computer Vision",
                year: "2023-24",
                description: "A longer description of this project. What problem does it solve? What was your role? What did you learn?",
                keywords: ["Grasshopper", "Rhino", "Python"],
                github: "https://github.com/begums",
                cover: "images/Project_2_image_0.png",
                images: ["images/Project_2_image_0.png"]
            },
            {
                id: "proj3",
                title: "Augmented Construction Training",
                tag: "Augmented Reality",
                year: "2023",
                description: "A longer description of this project. What problem does it solve? What was your role? What did you learn?",
                keywords: ["PyTorch", "SLAM", "C++"],
                github: "https://github.com/begums",
                cover: "images/Project_3_image_0.jpg",
                images: ["images/Project_3_image_0.jpg"]
            }
        ];

        // ── Helper to update min-width for all images ──
        function updateImageMinWidths() {
            document.querySelectorAll('.proj-title-top').forEach(titleEl => {
                const textWidth = titleEl.offsetWidth;
                const imgWrap = titleEl.closest('.project-item').querySelector('.proj-img-wrap');
                if (imgWrap && textWidth > 0) {
                    imgWrap.style.minWidth = textWidth + 'px';
                }
            });
        }

        // ── Build scroll strip ──
        function buildStrip() {
            const track = document.getElementById('scrollTrack');
            const originalItems = [];
            
            PROJECTS.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'project-item';
                // Generate random height between 40% and 90% of viewport (accounting for nav)
                const screenHeight = window.innerHeight - 52;
                const minHeight = screenHeight * 0.5;
                const maxHeight = screenHeight * 0.9;
                const randomHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                
                // Store project data on the element for easy access
                item.dataset.projectId = p.id;
                item.dataset.projectData = JSON.stringify(p);
                
                item.onclick = () => {
                    // Store project data for project.html to read
                    sessionStorage.setItem('currentProject', item.dataset.projectData);
                    sessionStorage.setItem('allProjects', JSON.stringify(PROJECTS));
                    window.location.href = `project.html?id=${p.id}`;
                };
                item.innerHTML = `
                    <div class="proj-label-top">
                        <span class="proj-title-top">${p.title}, ${p.year}</span>
                    </div>
                    <div class="proj-img-wrap" style="height: ${randomHeight}px;">
                        <img src="${p.cover}" alt="${p.title}" onerror="this.parentElement.classList.add('no-img')">
                        <div class="proj-num">${String(i + 1).padStart(2, '0')}</div>
                    </div>
                `;
                track.appendChild(item);
                originalItems.push({element: item, projectData: p});
            });
            
            // Clone all items for seamless looping and re-attach onclick handlers
            originalItems.forEach(({element, projectData: p}) => {
                const clone = element.cloneNode(true);
                clone.onclick = () => {
                    sessionStorage.setItem('currentProject', JSON.stringify(p));
                    sessionStorage.setItem('allProjects', JSON.stringify(PROJECTS));
                    window.location.href = `project.html?id=${p.id}`;
                };
                track.appendChild(clone);
            });
            
            // Measure and set image min-widths immediately and after images load
            updateImageMinWidths();
            document.querySelectorAll('.proj-img-wrap img').forEach(img => {
                img.addEventListener('load', updateImageMinWidths);
            });
        }

        // ── Panels ──
        function openPanel(id) {
            document.getElementById(id).classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closePanel(id) {
            document.getElementById(id).classList.remove('active');
            document.body.style.overflow = '';
        }
        document.querySelectorAll('.panel').forEach(panel => {
            panel.addEventListener('click', e => {
                if (e.target === panel) closePanel(panel.id);
            });
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape')
                document.querySelectorAll('.panel.active').forEach(p => closePanel(p.id));
        });

        // ── Scroll strip behavior ──
        const strip = document.getElementById('scrollStrip');
        const SCROLL_AMOUNT = 360;
        const AUTO_SCROLL_SPEED = 0.5; // pixels per frame
        let autoScrollActive = true;
        let autoScrollTimeout;
        let animationId;
        let baseWidth = 0; // Will be set after buildStrip

        // ── Auto-scroll function ──
        function autoScroll() {
            if (autoScrollActive) {
                strip.scrollLeft += AUTO_SCROLL_SPEED;
                // Seamless loop: reset to start when halfway through (cloned content)
                if (strip.scrollLeft >= baseWidth) {
                    strip.scrollLeft = 0;
                }
            }
            animationId = requestAnimationFrame(autoScroll);
        }

        // ── Pause auto-scroll and restart after timeout ──
        function pauseAutoScroll() {
            autoScrollActive = false;
            clearTimeout(autoScrollTimeout);
            autoScrollTimeout = setTimeout(() => {
                autoScrollActive = true;
            }, 3000); // Resume after 3 seconds of no user interaction
        }

        // ── Drag to scroll ──
        let isDown = false, startX, scrollLeft;
        strip.addEventListener('mousedown', e => {
            pauseAutoScroll();
            isDown = true;
            strip.style.cursor = 'grabbing';
            startX = e.pageX - strip.offsetLeft;
            scrollLeft = strip.scrollLeft;
        });
        strip.addEventListener('mouseleave', () => { isDown = false; strip.style.cursor = 'grab'; });
        strip.addEventListener('mouseup', () => { isDown = false; strip.style.cursor = 'grab'; });
        strip.addEventListener('mousemove', e => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - strip.offsetLeft;
            strip.scrollLeft = scrollLeft - (x - startX) * 1.2;
        });

        // ── Mouse wheel scroll ──
        strip.addEventListener('wheel', e => {
            pauseAutoScroll();
            e.preventDefault();
            strip.scrollLeft += e.deltaY * 0.5;
        }, { passive: false });

        // ── Resize handler ──
        window.addEventListener('resize', () => {
            const screenHeight = window.innerHeight - 52;
            const minHeight = screenHeight * 0.4;
            const maxHeight = screenHeight * 0.9;
            document.querySelectorAll('.proj-img-wrap').forEach(wrap => {
                const randomHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                wrap.style.height = randomHeight + 'px';
            });
            // Re-measure text widths on resize
            updateImageMinWidths();
        });

        buildStrip();
        // Calculate baseWidth (width of original content before cloning) and start auto-scroll
        setTimeout(() => {
            baseWidth = strip.scrollWidth / 2; // Since content is cloned, original is half
            autoScroll(); // Start auto-scrolling animation
        }, 100);
    </script>
</body>
</html>
