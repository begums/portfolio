<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">

            font-family: Arial, sans-serif;

        }

    </p>

    <h2>Projects</h2>

    <div class="project">
        <h3>Project Title</h3>
        <p>Short description of what it does.</p>
        <a href="#">GitHub Link</a>

    <h2>Contact</h2>
    <p>
        Email: your@email.com <br>
        GitHub: <a href="#">yourprofile</a>

</html>
