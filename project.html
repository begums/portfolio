<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="project.css">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400&display=swap" rel="stylesheet">
    <title>Project — Begüm Saral</title>
</head>
<body class="project-page">

    <!-- ── NAV ── -->
    <nav>
        <a href="index.html" class="nav-name nav-name-link">Begüm Saral</a>
        <div class="nav-links">
            <button onclick="window.location.href='information.html'">Information,</button>
            <button onclick="openPanel('contactPanel')">Contact</button>
        </div>
    </nav>

    <!-- ── PROJECT CONTENT ── -->
    <main id="projectContent">
        <aside id="projectInfo">
            <div id="projectMeta">
                <span id="projectTag" class="proj-tag"></span>
                <span id="projectYear" class="proj-year"></span>
            </div>
            <h1 id="projectTitle"></h1>
            <p id="projectDesc"></p>
            <p id="projectPublications" class="project-publications"></p>
            <ul id="projectTech" class="tech-list"></ul>
        </aside>
        <section id="projectImages"></section>
    </main>

    <!-- ── LIGHTBOX ── -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <div id="lightboxMedia"></div>
            <button class="lightbox-nav lightbox-prev" onclick="lightboxPrev()">&lt;</button>
            <button class="lightbox-nav lightbox-next" onclick="lightboxNext()">&gt;</button>
            <button class="lightbox-close" onclick="closeLightbox()">×</button>
        </div>
    </div>

    <!-- ── CONTACT PANEL ── -->
    <div class="panel" id="contactPanel">
        <div class="panel-inner">
            <button class="close-btn" onclick="closePanel('contactPanel')">Close</button>
            <div class="panel-content">
                <h2>Contact</h2>
                <p><a href="mailto:begum.saral@tum.de">begum.saral@tum.de</a></p>
                <p><a href="mailto:saral.begum@gmail.com">saral.begum@gmail.com</a></p>
                <p><a href="https://github.com/begums" target="_blank">GitHub ↗</a></p>
                <p><a href="https://www.linkedin.com/in/begum-saral/" target="_blank">LinkedIn ↗</a></p>
            </div>
        </div>
    </div>

    <script>
        let currentProject = null;
        let allMediaItems = [];
        let currentMediaIndex = 0;

        function loadProject() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            let p = null;
            try {
                const stored = sessionStorage.getItem('currentProject');
                if (stored) p = JSON.parse(stored);
                if (!p || p.id !== id) {
                    const all = JSON.parse(sessionStorage.getItem('allProjects') || '[]');
                    p = all.find(x => x.id === id) || null;
                }
            } catch(e) {}

            if (!p) {
                document.getElementById('projectTitle').textContent = 'Project not found. Please navigate from the home page.';
                return;
            }

            currentProject = p;

            document.title = `${p.title} — Begüm Saral`;
            document.getElementById('projectTag').textContent = p.tag;
            document.getElementById('projectYear').textContent = p.year;
            document.getElementById('projectTitle').textContent = p.title;
            document.getElementById('projectDesc').textContent = p.description;

            const techList = document.getElementById('projectTech');
            (p.keywords || []).forEach(k => {
                const span = document.createElement('span');
                span.textContent = k;
                techList.appendChild(span);
            });

            const pubsElement = document.getElementById('projectPublications');
            if (p.publications) {
                pubsElement.innerHTML = p.publications;
            } else {
                pubsElement.style.display = 'none';
            }

            const grid = document.getElementById('projectImages');
            allMediaItems = [];

            // Add vimeo video if available
            if (p.vimeo_id) {
                const vimeoDiv = document.createElement('div');
                vimeoDiv.className = 'grid-item';
                const vimeoIndex = allMediaItems.length;
                vimeoDiv.onclick = () => openLightbox(vimeoIndex);
                
                // Fetch Vimeo thumbnail
                let thumbnailLoaded = false;
                fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${p.vimeo_id}`)
                    .then(res => res.json())
                    .then(data => {
                        const img = document.createElement('img');
                        img.src = data.thumbnail_url;
                        img.alt = 'Video thumbnail';
                        img.style.width = '100%';
                        img.style.height = '100%';
                        img.style.objectFit = 'contain';
                        vimeoDiv.appendChild(img);
                        thumbnailLoaded = true;
                    })
                    .catch(() => {
                        // No thumbnail available - show black box
                        if (!thumbnailLoaded) {
                            vimeoDiv.style.background = '#1a1a1a';
                            vimeoDiv.style.minHeight = '400px';
                        }
                    });
                
                const overlay = document.createElement('div');
                overlay.className = 'grid-item-overlay';
                
                const playButton = document.createElement('div');
                playButton.className = 'play-button';
                playButton.innerHTML = '▶';
                playButton.style.color = '#fff';
                playButton.style.fontSize = '24px';
                playButton.style.lineHeight = '1';
                
                overlay.appendChild(playButton);
                vimeoDiv.appendChild(overlay);
                grid.appendChild(vimeoDiv);
                allMediaItems.push({ type: 'vimeo', vimeo_id: p.vimeo_id });
            }

            // Add images (supports both array and object formats)
            if (p.images) {
                const isObjectFormat = !Array.isArray(p.images);
                
                if (isObjectFormat) {
                    // Object format with grid positions
                    let lastWasBreak = false;
                    Object.values(p.images).forEach(item => {
                        if (item.breakLine) {
                            const spacer = document.createElement('div');
                            spacer.className = 'force-break';
                            grid.appendChild(spacer);
                            lastWasBreak = true;
                            return;
                        }
                        
                        const div = document.createElement('div');
                        div.className = 'grid-item' + (item.colSpan && item.colSpan > 1 ? ' multi-col' : '') + (lastWasBreak ? ' after-break' : '');
                        lastWasBreak = false;
                        const imageIndex = allMediaItems.length;
                        div.onclick = () => openLightbox(imageIndex);
                        const img = document.createElement('img');
                        img.src = item.src;
                        img.alt = p.title;
                        div.appendChild(img);
                        if (item.caption) {
                            const caption = document.createElement('div');
                            caption.className = 'grid-item-caption';
                            caption.textContent = item.caption;
                            div.appendChild(caption);
                        }
                        grid.appendChild(div);
                        allMediaItems.push({ type: 'image', src: item.src });
                    });
                } else {
                    // Array format (backward compatible)
                    p.images.forEach((item, idx) => {
                        // Support both string format and object format with breakLine
                        const src = typeof item === 'string' ? item : item.src;
                        const breakLine = typeof item === 'object' && item.breakLine;
                        
                        // Track if next item should be marked as after-break
                        if (breakLine) {
                            const spacer = document.createElement('div');
                            spacer.className = 'force-break';
                            grid.appendChild(spacer);
                        }
                        
                        if (typeof item === 'string') {
                            // String items can't be marked as after-break since there's no breakLine info
                            const div = document.createElement('div');
                            div.className = 'grid-item';
                            const imageIndex = allMediaItems.length;
                            div.onclick = () => openLightbox(imageIndex);
                            const img = document.createElement('img');
                            img.src = item;
                            img.alt = p.title;
                            div.appendChild(img);
                            grid.appendChild(div);
                            allMediaItems.push({ type: 'image', src: item });
                        } else {
                            const div = document.createElement('div');
                            div.className = 'grid-item';
                            const imageIndex = allMediaItems.length;
                            div.onclick = () => openLightbox(imageIndex);
                            const img = document.createElement('img');
                            img.src = src;
                            img.alt = p.title;
                            div.appendChild(img);
                            if (item.caption) {
                                const caption = document.createElement('div');
                                caption.className = 'grid-item-caption';
                                caption.textContent = item.caption;
                                div.appendChild(caption);
                            }
                            grid.appendChild(div);
                            allMediaItems.push({ type: 'image', src: src });
                        }
                    });
                }
            } else if (p.cover) {
                const div = document.createElement('div');
                div.className = 'grid-item';
                const imageIndex = allMediaItems.length;
                div.onclick = () => openLightbox(imageIndex);
                const img = document.createElement('img');
                img.src = p.cover;
                img.alt = p.title;
                div.appendChild(img);
                grid.appendChild(div);
                allMediaItems.push({ type: 'image', src: p.cover });
            }
        }

        function openLightbox(index) {
            currentMediaIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function lightboxNext() {
            event.stopPropagation();
            currentMediaIndex = (currentMediaIndex + 1) % allMediaItems.length;
            updateLightbox();
        }

        function lightboxPrev() {
            event.stopPropagation();
            currentMediaIndex = (currentMediaIndex - 1 + allMediaItems.length) % allMediaItems.length;
            updateLightbox();
        }

        function updateLightbox() {
            const media = allMediaItems[currentMediaIndex];
            const container = document.getElementById('lightboxMedia');
            container.innerHTML = '';

            if (media.type === 'image') {
                const img = document.createElement('img');
                img.src = media.src;
                img.alt = 'Project image';
                img.className = 'lightbox-media';
                container.appendChild(img);
            } else if (media.type === 'vimeo') {
                const iframe = document.createElement('iframe');
                iframe.src = `https://player.vimeo.com/video/${media.vimeo_id}?h=&autoplay=1`;
                iframe.width = '100%';
                iframe.height = '100%';
                iframe.frameborder = '0';
                iframe.allowFullscreen = true;
                iframe.allow = 'autoplay';
                iframe.className = 'lightbox-media';
                container.appendChild(iframe);
            }
        }

        // Close lightbox when clicking the image or background
        document.getElementById('lightbox').addEventListener('click', function(e) {
            // Close on any click except the nav buttons
            if (!e.target.closest('.lightbox-nav')) {
                closeLightbox();
            }
        });

        // Close on Esc, navigate with arrow keys
        document.addEventListener('keydown', e => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowRight') lightboxNext();
                if (e.key === 'ArrowLeft') lightboxPrev();
            }
        });

        // ── Panel functions ──
        function openPanel(id) {
            document.getElementById(id).classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closePanel(id) {
            document.getElementById(id).classList.remove('active');
            document.body.style.overflow = '';
        }
        document.querySelectorAll('.panel').forEach(panel => {
            panel.addEventListener('click', e => {
                if (e.target === panel) closePanel(panel.id);
            });
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape')
                document.querySelectorAll('.panel.active').forEach(p => closePanel(p.id));
        });

        loadProject();
    </script>
</body>
</html>
